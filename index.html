<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>朝刊 — My Morning Paper</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1c1510;
  --ink-mid: #3a2e24;
  --ink-muted: #7a6a58;
  --ink-faint: #b0a090;
  --paper: #f7f2e8;
  --paper-dark: #ede6d4;
  --paper-line: #d8cdb8;
  --accent: #8b1a1a;
  --accent-hover: #a82020;
  --gold: #b8860b;
  --badge-ai: #1a4a6b;
  --badge-game: #1a5c2e;
  --badge-anime: #5c1a4a;
  --badge-ja: #6b3a1a;
  --badge-en: #1a3a6b;
  --imp-high: #8b1a1a;
  --imp-mid: #7a5c1a;
  --imp-low: #2a4a2a;
  --shadow: rgba(28,21,16,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #c8c0b0;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='4' height='4' fill='%23c8c0b0'/%3E%3Ccircle cx='1' cy='1' r='0.5' fill='%23b8b0a0' opacity='0.4'/%3E%3C/svg%3E");
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── NEWSPAPER WRAPPER ── */
.newspaper {
  max-width: 780px;
  margin: 0 auto;
  background: var(--paper);
  min-height: 100vh;
  box-shadow: 0 0 40px rgba(0,0,0,0.3);
  position: relative;
}

/* ── MASTHEAD ── */
.masthead {
  background: var(--paper-dark);
  border-bottom: 3px double var(--ink);
  padding: 12px 16px 10px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.masthead-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--ink-muted);
  font-family: 'Noto Serif JP', serif;
  margin-bottom: 4px;
  letter-spacing: 0.05em;
}
.masthead-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 7vw, 3rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--ink);
}
.masthead-tagline {
  font-family: 'Noto Serif JP', serif;
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.25em;
  margin-top: 3px;
}
.masthead-nav {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-top: 8px;
  border-top: 1px solid var(--paper-line);
  padding-top: 8px;
}
.nav-btn {
  background: none;
  border: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  color: var(--ink-muted);
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.nav-btn:hover, .nav-btn.active {
  background: var(--ink);
  color: var(--paper);
}

/* ── TODAY'S SUMMARY BAR ── */
.summary-bar {
  background: var(--ink);
  color: var(--paper);
  padding: 10px 16px;
  font-family: 'Noto Serif JP', serif;
  font-size: 12px;
  line-height: 1.6;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.summary-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--gold);
  white-space: nowrap;
  margin-top: 2px;
  flex-shrink: 0;
}

/* ── FILTER BAR ── */
.filter-bar {
  border-bottom: 1px solid var(--paper-line);
  padding: 8px 16px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  background: var(--paper-dark);
}
.filter-label {
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.1em;
  margin-right: 2px;
}
.filter-btn {
  background: none;
  border: 1px solid var(--paper-line);
  border-radius: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px;
  color: var(--ink-mid);
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--ink-muted); }
.filter-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

/* ── CATEGORY SECTIONS ── */
.category-section { border-bottom: 2px solid var(--ink); }
.category-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--paper-dark);
  border-bottom: 1px solid var(--paper-line);
  cursor: pointer;
  user-select: none;
}
.category-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.category-toggle {
  font-size: 12px;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.category-body { }
.category-body.hidden { display: none; }

/* ── ARTICLE CARD ── */
.article-card {
  border-bottom: 1px solid var(--paper-line);
  padding: 14px 16px;
  transition: background 0.1s;
  position: relative;
}
.article-card:hover { background: rgba(0,0,0,0.02); }
.article-card.read { opacity: 0.6; }

.article-badges {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 2px 6px;
  border-radius: 2px;
  text-transform: uppercase;
}
.badge-cat-ai { background: #ddeaf4; color: var(--badge-ai); }
.badge-cat-game { background: #d8eedd; color: var(--badge-game); }
.badge-cat-anime { background: #edd8ea; color: var(--badge-anime); }
.badge-ja { background: #f4e8d8; color: var(--badge-ja); }
.badge-en { background: #d8e4f4; color: var(--badge-en); }
.badge-new { background: var(--accent); color: white; }
.badge-imp-high { background: #f4d8d8; color: var(--imp-high); }
.badge-imp-mid { background: #f4eed8; color: var(--imp-mid); }
.badge-imp-low { background: #d8ecd8; color: var(--imp-low); }

.article-headline {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  font-weight: 700;
  line-height: 1.5;
  color: var(--ink);
  margin-bottom: 6px;
  cursor: pointer;
}
.article-headline:hover { color: var(--accent); }

.article-summary {
  font-size: 12px;
  line-height: 1.75;
  color: var(--ink-mid);
  margin-bottom: 8px;
  font-family: 'Noto Serif JP', serif;
}

.article-ai-comment {
  font-size: 11px;
  color: var(--ink-muted);
  background: var(--paper-dark);
  border-left: 2px solid var(--gold);
  padding: 4px 8px;
  margin-bottom: 8px;
  font-style: italic;
  font-family: 'Noto Serif JP', serif;
}

.article-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.action-btn {
  background: none;
  border: 1px solid var(--paper-line);
  border-radius: 2px;
  font-size: 10px;
  color: var(--ink-muted);
  padding: 3px 8px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 3px;
}
.action-btn:hover { border-color: var(--ink-muted); color: var(--ink); }
.action-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.action-link {
  font-size: 10px;
  color: var(--accent);
  text-decoration: none;
  margin-left: auto;
  letter-spacing: 0.05em;
}
.action-link:hover { text-decoration: underline; }

/* ── LOADING STATE ── */
.loading-overlay {
  padding: 60px 16px;
  text-align: center;
}
.loading-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--ink);
  margin-bottom: 12px;
}
.loading-steps {
  list-style: none;
  text-align: left;
  max-width: 260px;
  margin: 0 auto 20px;
}
.loading-steps li {
  font-size: 12px;
  color: var(--ink-muted);
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Noto Serif JP', serif;
}
.loading-steps li::before {
  content: '▸';
  color: var(--gold);
  flex-shrink: 0;
}
.loading-steps li.done { color: var(--ink); }
.loading-steps li.done::before { content: '✓'; color: var(--imp-low); }
.loading-steps li.active { color: var(--accent); font-weight: 700; }
.loading-steps li.active::before { content: '●'; animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.progress-bar-wrap {
  width: 200px;
  height: 3px;
  background: var(--paper-line);
  margin: 0 auto;
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--ink);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 60px 16px;
  text-align: center;
}
.empty-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--ink);
  margin-bottom: 8px;
}
.empty-sub {
  font-size: 12px;
  color: var(--ink-muted);
  font-family: 'Noto Serif JP', serif;
  margin-bottom: 20px;
  line-height: 1.8;
}
.primary-btn {
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 12px 28px;
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.15s;
}
.primary-btn:hover { background: var(--ink-mid); }

/* ── ARCHIVE SCREEN ── */
.archive-list {
  padding: 16px;
}
.archive-item {
  border: 1px solid var(--paper-line);
  border-radius: 2px;
  padding: 12px 14px;
  margin-bottom: 10px;
  background: var(--paper-dark);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.15s;
}
.archive-item:hover { border-color: var(--ink-muted); }
.archive-date {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
}
.archive-meta {
  font-size: 10px;
  color: var(--ink-muted);
  margin-top: 2px;
  font-family: 'Noto Serif JP', serif;
}
.archive-actions {
  display: flex;
  gap: 6px;
}
.archive-saved-badge {
  font-size: 9px;
  background: var(--gold);
  color: white;
  padding: 2px 6px;
  border-radius: 2px;
  letter-spacing: 0.1em;
}

/* ── SETTINGS SCREEN ── */
.settings-body {
  padding: 16px;
}
.settings-section {
  margin-bottom: 24px;
}
.settings-section-title {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
  border-bottom: 1px solid var(--paper-line);
  padding-bottom: 6px;
  margin-bottom: 12px;
  color: var(--ink);
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--paper-line);
  gap: 8px;
}
.settings-label {
  font-size: 12px;
  color: var(--ink-mid);
  font-family: 'Noto Serif JP', serif;
  flex: 1;
}
.settings-input {
  border: 1px solid var(--paper-line);
  background: var(--paper);
  padding: 5px 8px;
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  border-radius: 2px;
  color: var(--ink);
  width: 80px;
}
.settings-input:focus { outline: none; border-color: var(--ink-muted); }

/* Category editor */
.category-editor {
  border: 1px solid var(--paper-line);
  border-radius: 2px;
  margin-bottom: 10px;
  background: var(--paper-dark);
}
.category-editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--paper-line);
}
.category-editor-name {
  font-size: 13px;
  font-weight: 700;
  font-family: 'Noto Serif JP', serif;
}
.btn-danger {
  background: none;
  border: 1px solid #d88;
  color: var(--accent);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 2px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
}
.btn-danger:hover { background: #f4d8d8; }
.topic-list { padding: 8px 12px; }
.topic-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
  border-bottom: 1px solid var(--paper-line);
}
.topic-item:last-child { border-bottom: none; }
.topic-text {
  font-size: 11px;
  color: var(--ink-mid);
  flex: 1;
  font-family: 'Noto Serif JP', serif;
}
.btn-remove {
  background: none;
  border: none;
  color: var(--ink-faint);
  cursor: pointer;
  font-size: 14px;
  padding: 0 4px;
  line-height: 1;
}
.btn-remove:hover { color: var(--accent); }
.add-topic-row {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  border-top: 1px solid var(--paper-line);
}
.add-input {
  flex: 1;
  border: 1px solid var(--paper-line);
  background: var(--paper);
  padding: 5px 8px;
  font-size: 11px;
  font-family: 'Noto Sans JP', sans-serif;
  border-radius: 2px;
  color: var(--ink);
}
.add-input:focus { outline: none; border-color: var(--ink-muted); }
.btn-add {
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 5px 12px;
  font-size: 11px;
  border-radius: 2px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
}
.btn-add:hover { background: var(--ink-mid); }

.add-category-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.section-divider {
  border: none;
  border-top: 1px solid var(--paper-line);
  margin: 16px 0;
}

/* ── BOOKMARKS SCREEN ── */
.bookmarks-body { padding: 0; }
.bookmarks-empty {
  padding: 60px 16px;
  text-align: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--ink-muted);
}

/* ── RESPONSIVE ── */
@media (min-width: 600px) {
  .newspaper { margin: 20px auto; min-height: auto; }
  .masthead { padding: 16px 24px 12px; }
  .filter-bar { padding: 10px 24px; }
  .article-card { padding: 18px 24px; }
  .category-header { padding: 12px 24px; }
  .article-headline { font-size: 16px; }
  .summary-bar { padding: 12px 24px; }
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: var(--paper);
  padding: 8px 20px;
  border-radius: 2px;
  font-size: 12px;
  font-family: 'Noto Serif JP', serif;
  z-index: 9999;
  transition: transform 0.3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="newspaper">
  <!-- MASTHEAD -->
  <div class="masthead">
    <div class="masthead-meta">
      <span id="today-date"></span>
      <span id="last-updated-label">未取得</span>
    </div>
    <div class="masthead-title">朝刊</div>
    <div class="masthead-tagline">MY MORNING PAPER</div>
    <nav class="masthead-nav">
      <button class="nav-btn active" onclick="showScreen('today')">今日</button>
      <button class="nav-btn" onclick="showScreen('bookmarks')">ブックマーク</button>
      <button class="nav-btn" onclick="showScreen('archive')">アーカイブ</button>
      <button class="nav-btn" onclick="showScreen('settings')">設定</button>
    </nav>
  </div>

  <!-- TODAY SCREEN -->
  <div id="screen-today" class="screen active">
    <!-- Filter Bar -->
    <div class="filter-bar" id="filter-bar">
      <span class="filter-label">表示：</span>
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('high', this)">重要度高</button>
      <button class="filter-btn" onclick="setFilter('ja', this)">JAのみ</button>
      <button class="filter-btn" onclick="setFilter('unread', this)">未読のみ</button>
      <button class="filter-btn" onclick="setFilter('bookmarked', this)">★のみ</button>
    </div>

    <!-- Content area -->
    <div id="today-content"></div>
  </div>

  <!-- BOOKMARKS SCREEN -->
  <div id="screen-bookmarks" class="screen">
    <div class="bookmarks-body" id="bookmarks-content"></div>
  </div>

  <!-- ARCHIVE SCREEN -->
  <div id="screen-archive" class="screen">
    <div class="archive-list" id="archive-content"></div>
  </div>

  <!-- SETTINGS SCREEN -->
  <div id="screen-settings" class="screen">
    <div class="settings-body">
      <div class="settings-section">
        <div class="settings-section-title">更新設定</div>
        <div class="settings-row">
          <span class="settings-label">更新時刻</span>
          <input type="time" id="update-time" class="settings-input" value="06:00" onchange="saveSettings()">
        </div>
        <div class="settings-row">
          <span class="settings-label">1カテゴリあたりの件数</span>
          <input type="number" id="articles-per-cat" class="settings-input" value="10" min="3" max="20" onchange="saveSettings()">
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">カテゴリ・トピック管理</div>
        <div id="category-editors"></div>
        <div class="add-category-row">
          <input type="text" id="new-category-input" class="add-input" placeholder="新しいカテゴリ名">
          <button class="btn-add" onclick="addCategory()">追加</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">APIキー</div>
        <div class="settings-row">
          <span class="settings-label">Anthropic API Key</span>
          <input type="password" id="api-key-input" class="settings-input" style="width:160px" placeholder="sk-ant-..." onchange="saveSettings()">
        </div>
        <p style="font-size:10px;color:var(--ink-muted);margin-top:6px;font-family:'Noto Serif JP',serif;line-height:1.7">
          APIキーはブラウザのlocalStorageにのみ保存されます。外部に送信されることはありません。
        </p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let state = {
  articles: [],       // today's articles
  filter: 'all',
  readIds: new Set(),
  bookmarkIds: new Set(),
  categoryVisibility: {},
  todaySummary: '',
  lastFetchDate: null,
  settings: {
    updateTime: '06:00',
    articlesPerCat: 10,
    apiKey: ''
  },
  categories: [
    {
      id: 'tech',
      name: 'テクノロジー・AI',
      badge: 'badge-cat-ai',
      topics: [
        'AI・大規模言語モデル 最新動向',
        'スタートアップ 資金調達 ニュース',
        'Apple Google Meta テック大手 最新',
        'Claude Gemini ChatGPT 使い方 Tips 裏技'
      ]
    },
    {
      id: 'game',
      name: 'ゲーム',
      badge: 'badge-cat-game',
      topics: [
        'Nintendo Switch Sony PlayStation Xbox 新作',
        'PCゲーム Steam 新作 アップデート',
        'インディーゲーム 注目 新作'
      ]
    },
    {
      id: 'anime',
      name: 'アニメ・マンガ',
      badge: 'badge-cat-anime',
      topics: [
        'アニメ 週間ランキング 話題',
        'マンガ 人気 トレンド 新連載'
      ]
    }
  ],
  archives: []
};

// ── PERSISTENCE ──
function loadState() {
  try {
    const saved = localStorage.getItem('asakan_state');
    if (saved) {
      const s = JSON.parse(saved);
      if (s.settings) state.settings = { ...state.settings, ...s.settings };
      if (s.categories) state.categories = s.categories;
      if (s.archives) state.archives = s.archives;
      if (s.readIds) state.readIds = new Set(s.readIds);
      if (s.bookmarkIds) state.bookmarkIds = new Set(s.bookmarkIds);
      if (s.lastFetchDate) state.lastFetchDate = s.lastFetchDate;
      if (s.articles) state.articles = s.articles;
      if (s.todaySummary) state.todaySummary = s.todaySummary;
      if (s.categoryVisibility) state.categoryVisibility = s.categoryVisibility;
    }
    document.getElementById('update-time').value = state.settings.updateTime;
    document.getElementById('articles-per-cat').value = state.settings.articlesPerCat;
    document.getElementById('api-key-input').value = state.settings.apiKey;
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('asakan_state', JSON.stringify({
      ...state,
      readIds: [...state.readIds],
      bookmarkIds: [...state.bookmarkIds]
    }));
  } catch(e) {}
}

function saveSettings() {
  state.settings.updateTime = document.getElementById('update-time').value;
  state.settings.articlesPerCat = parseInt(document.getElementById('articles-per-cat').value) || 10;
  state.settings.apiKey = document.getElementById('api-key-input').value;
  saveState();
  showToast('設定を保存しました');
}

// ── ROUTING ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  const btns = document.querySelectorAll('.nav-btn');
  const labels = ['today','bookmarks','archive','settings'];
  btns[labels.indexOf(name)]?.classList.add('active');

  if (name === 'archive') renderArchive();
  if (name === 'bookmarks') renderBookmarks();
  if (name === 'settings') renderCategoryEditors();
}

// ── DATE UTILS ──
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function formatDateJA(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function needsFetch() {
  const today = todayStr();
  if (state.lastFetchDate !== today) return true;
  const [h, m] = state.settings.updateTime.split(':').map(Number);
  const now = new Date();
  const updateToday = new Date();
  updateToday.setHours(h, m, 0, 0);
  return now >= updateToday && state.lastFetchDate !== today;
}

// ── RENDER TODAY ──
function renderToday() {
  const el = document.getElementById('today-content');

  if (!state.articles.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-title">今日の朝刊はまだです</div>
        <div class="empty-sub">
          朝刊を取得してみましょう。<br>
          設定でAPIキーを登録すると<br>AIが最新ニュースをまとめます。
        </div>
        <button class="primary-btn" onclick="fetchNews()">今日の朝刊を取得する</button>
      </div>`;
    return;
  }

  let html = '';

  // Summary bar
  if (state.todaySummary) {
    html += `<div class="summary-bar">
      <span class="summary-label">TODAY</span>
      <span>${state.todaySummary}</span>
    </div>`;
  }

  // Group articles by category
  const catMap = {};
  state.categories.forEach(c => catMap[c.id] = []);

  let filtered = state.articles;
  if (state.filter === 'high') filtered = filtered.filter(a => a.importance === '高');
  if (state.filter === 'ja') filtered = filtered.filter(a => a.lang === 'JA');
  if (state.filter === 'unread') filtered = filtered.filter(a => !state.readIds.has(a.id));
  if (state.filter === 'bookmarked') filtered = filtered.filter(a => state.bookmarkIds.has(a.id));

  filtered.forEach(a => {
    if (catMap[a.catId] !== undefined) catMap[a.catId].push(a);
  });

  state.categories.forEach(cat => {
    const arts = catMap[cat.id] || [];
    const isHidden = state.categoryVisibility[cat.id] === false;
    html += `<div class="category-section">
      <div class="category-header" onclick="toggleCategory('${cat.id}')">
        <span class="category-name">${cat.name}</span>
        <span class="category-toggle">
          <span>${arts.length}件</span>
          <span>${isHidden ? '▶' : '▼'}</span>
        </span>
      </div>
      <div class="category-body ${isHidden ? 'hidden' : ''}" id="catbody-${cat.id}">`;

    if (arts.length === 0) {
      html += `<div style="padding:16px;font-size:12px;color:var(--ink-muted);font-family:'Noto Serif JP',serif;">記事がありません</div>`;
    } else {
      arts.forEach(a => {
        const isRead = state.readIds.has(a.id);
        const isBookmarked = state.bookmarkIds.has(a.id);
        html += `<div class="article-card ${isRead ? 'read' : ''}" id="article-${a.id}">
          <div class="article-badges">
            <span class="badge ${cat.badge}">${cat.name}</span>
            <span class="badge ${a.lang === 'JA' ? 'badge-ja' : 'badge-en'}">${a.lang}</span>
            ${a.isNew ? '<span class="badge badge-new">NEW</span>' : ''}
            <span class="badge ${a.importance === '高' ? 'badge-imp-high' : a.importance === '中' ? 'badge-imp-mid' : 'badge-imp-low'}">重要度${a.importance}</span>
          </div>
          <div class="article-headline" onclick="markRead('${a.id}')">${a.headline}</div>
          <div class="article-summary">${a.summary}</div>
          <div class="article-ai-comment">💬 ${a.comment}</div>
          <div class="article-actions">
            <button class="action-btn ${isBookmarked ? 'active' : ''}" onclick="toggleBookmark('${a.id}')">
              ${isBookmarked ? '★' : '☆'} ブックマーク
            </button>
            <button class="action-btn ${isRead ? 'active' : ''}" onclick="toggleRead('${a.id}')">
              ${isRead ? '✓ 既読' : '○ 未読'}
            </button>
            <a class="action-link" href="${a.url}" target="_blank" onclick="markRead('${a.id}')">元記事 →</a>
          </div>
        </div>`;
      });
    }
    html += `</div></div>`;
  });

  el.innerHTML = html;
  updateLastUpdatedLabel();
}

function toggleCategory(id) {
  const body = document.getElementById('catbody-' + id);
  const isHidden = body.classList.toggle('hidden');
  state.categoryVisibility[id] = !isHidden;
  saveState();
  // Update arrow
  renderToday();
}

function setFilter(f, btn) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderToday();
}

function toggleBookmark(id) {
  if (state.bookmarkIds.has(id)) {
    state.bookmarkIds.delete(id);
    showToast('ブックマークを解除しました');
  } else {
    state.bookmarkIds.add(id);
    showToast('ブックマークしました');
  }
  saveState();
  renderToday();
}

function toggleRead(id) {
  if (state.readIds.has(id)) {
    state.readIds.delete(id);
  } else {
    state.readIds.add(id);
  }
  saveState();
  renderToday();
}

function markRead(id) {
  state.readIds.add(id);
  saveState();
}

function updateLastUpdatedLabel() {
  const el = document.getElementById('last-updated-label');
  if (state.lastFetchDate) {
    el.textContent = `最終取得: ${state.lastFetchDate}`;
  }
}

// ── FETCH NEWS (Claude API with web search) ──
async function callClaude(messages, useSearch) {
  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 8000,
    messages
  };
  if (useSearch) body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API Error ${response.status}`);
  }
  return await response.json();
}

function extractText(data) {
  return (data.content || [])
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('');
}

// Build full conversation including tool_use/tool_result turns
function buildConversation(data, userPrompt) {
  const msgs = [{ role: 'user', content: userPrompt }];
  if (data.content && data.content.length) {
    msgs.push({ role: 'assistant', content: data.content });
  }
  return msgs;
}

async function fetchNews() {
  const apiKey = state.settings.apiKey;
  if (!apiKey) {
    showToast('設定からAPIキーを登録してください');
    showScreen('settings');
    return;
  }

  showLoadingState();

  const catCount = state.settings.articlesPerCat;
  const today = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });

  const searchPrompt = `あなたは優秀なニュースキュレーターです。今日（${today}）の最新情報をウェブ検索して収集してください。

以下のカテゴリ・トピックで検索し、各カテゴリ${catCount}件程度の最新記事を集めてください：
${state.categories.map(c => `\n【${c.name}】(catId: ${c.id})\n${c.topics.map(t => '- ' + t).join('\n')}`).join('\n')}

収集したら、記事の情報（タイトル、URL、内容の概要）をすべて教えてください。`;

  try {
    updateLoadingStep(0);

    // Step 1: Search
    let data = await callClaude([{ role: 'user', content: searchPrompt }], true);
    updateLoadingStep(1);

    // Handle tool_use loop (agentic search)
    let loopCount = 0;
    while (data.stop_reason === 'tool_use' && loopCount < 8) {
      loopCount++;
      const toolUseBlocks = data.content.filter(b => b.type === 'tool_use');
      const toolResults = toolUseBlocks.map(b => ({
        type: 'tool_result',
        tool_use_id: b.id,
        content: b.input ? JSON.stringify(b.input) : 'Search completed'
      }));

      const msgs = [
        { role: 'user', content: searchPrompt },
        { role: 'assistant', content: data.content },
        { role: 'user', content: toolResults }
      ];
      data = await callClaude(msgs, true);
    }

    updateLoadingStep(2);
    const searchResults = extractText(data);

    if (!searchResults.trim()) throw new Error('検索結果が取得できませんでした');

    // Step 2: Format as JSON
    const formatPrompt = `以下の検索結果をもとに、指定のJSON形式でまとめてください。

検索結果：
${searchResults}

以下のJSON形式のみで出力してください（マークダウンのコードブロックなし、JSONのみ）：
{"summary":"今日全体の一言要約（日本語1文30字程度）","articles":[{"id":"a1","catId":"tech","headline":"引きのある日本語見出し","summary":"日本語要約2〜3文（英語記事も日本語で）","comment":"AIの一言コメント","importance":"高","lang":"JA","url":"https://...","isNew":true}]}

catIdは必ず ${state.categories.map(c => c.id).join(' / ')} のいずれかを使用。
重要度：高=業界への大きな影響、中=注目情報、低=参考情報。
langは元記事の言語（JA/EN）。日英バランスよく。`;

    updateLoadingStep(3);
    const formatData = await callClaude([{ role: 'user', content: formatPrompt }], false);
    const rawText = extractText(formatData);

    // Robust JSON extraction
    let parsed = null;
    const patterns = [
      /```json\s*([\s\S]*?)\s*```/,
      /```\s*([\s\S]*?)\s*```/,
      /(\{[\s\S]*\})/
    ];
    for (const pat of patterns) {
      const m = rawText.match(pat);
      if (m) {
        try { parsed = JSON.parse(m[1]); break; } catch(e2) {}
      }
    }
    if (!parsed) throw new Error('JSONの解析に失敗しました。APIキーを確認してください。');

    updateLoadingStep(4);

    state.articles = (parsed.articles || []).map((a, i) => ({ ...a, id: a.id || 'art_' + i }));
    state.todaySummary = parsed.summary || '';
    state.lastFetchDate = todayStr();

    archiveOldNews();
    saveState();

    setTimeout(() => renderToday(), 400);

  } catch(e) {
    document.getElementById('today-content').innerHTML = `<div class="empty-state">
      <div class="empty-title">取得に失敗しました</div>
      <div class="empty-sub">${e.message}<br><br>APIキーや接続環境を確認してください。</div>
      <button class="primary-btn" onclick="fetchNews()">再試行</button>
    </div>`;
    console.error(e);
  }
}

let loadingStepIndex = 0;
const loadingSteps = [
  'ウェブ検索中...',
  'AI が記事を収集中...',
  '要約・翻訳中...',
  '朝刊を組版中...'
];

function showLoadingState() {
  loadingStepIndex = 0;
  const el = document.getElementById('today-content');
  el.innerHTML = `<div class="loading-overlay">
    <div class="loading-title">朝刊を取得しています</div>
    <ul class="loading-steps" id="loading-steps">
      ${loadingSteps.map((s,i) => `<li id="lstep-${i}" class="${i===0?'active':''}">${s}</li>`).join('')}
    </ul>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:10%"></div>
    </div>
  </div>`;
}

function updateLoadingStep(step) {
  for(let i = 0; i < loadingSteps.length; i++) {
    const el = document.getElementById('lstep-' + i);
    if (!el) return;
    if (i < step) { el.className = 'done'; }
    else if (i === step) { el.className = 'active'; }
    else { el.className = ''; }
  }
  const pct = Math.round((step / loadingSteps.length) * 100);
  const fill = document.getElementById('progress-fill');
  if (fill) fill.style.width = pct + '%';
}

// ── ARCHIVE ──
function archiveOldNews() {
  const today = todayStr();
  if (state.lastFetchDate && state.articles.length) {
    // Move yesterday's articles to archive
    const existing = state.archives.findIndex(a => a.date === state.lastFetchDate);
    if (existing === -1 && state.lastFetchDate !== today) {
      state.archives.unshift({
        date: state.lastFetchDate,
        articles: state.articles,
        summary: state.todaySummary,
        saved: false,
        expiresAt: Date.now() + (3 * 24 * 60 * 60 * 1000)
      });
    }
  }

  // Remove expired unsaved archives
  state.archives = state.archives.filter(a => a.saved || a.expiresAt > Date.now());
}

function renderArchive() {
  const el = document.getElementById('archive-content');
  if (!state.archives.length) {
    el.innerHTML = `<div style="padding:40px 16px;text-align:center;font-family:'Noto Serif JP',serif;font-size:13px;color:var(--ink-muted);">
      アーカイブはまだありません
    </div>`;
    return;
  }

  el.innerHTML = state.archives.map((a, i) => `
    <div class="archive-item">
      <div onclick="viewArchive(${i})" style="flex:1;cursor:pointer">
        <div class="archive-date">${formatDateJA(a.date)}</div>
        <div class="archive-meta">${a.articles.length}件の記事${a.saved ? '' : ' · 期限: 3日以内'}</div>
      </div>
      <div class="archive-actions">
        ${a.saved
          ? `<span class="archive-saved-badge">保存済</span>
             <button class="btn-danger" onclick="unsaveArchive(${i},event)">削除</button>`
          : `<button class="btn-add" onclick="saveArchive(${i},event)">保存</button>`
        }
      </div>
    </div>
  `).join('');
}

function saveArchive(i, e) {
  e.stopPropagation();
  state.archives[i].saved = true;
  saveState();
  renderArchive();
  showToast('保存しました');
}

function unsaveArchive(i, e) {
  e.stopPropagation();
  if (confirm('このアーカイブを削除しますか？')) {
    state.archives.splice(i, 1);
    saveState();
    renderArchive();
    showToast('削除しました');
  }
}

function viewArchive(i) {
  const archive = state.archives[i];
  // Temporarily show archive articles
  const prevArticles = state.articles;
  const prevSummary = state.todaySummary;
  state.articles = archive.articles;
  state.todaySummary = archive.summary;
  showScreen('today');
  renderToday();
  // Restore
  state.articles = prevArticles;
  state.todaySummary = prevSummary;
}

// ── BOOKMARKS ──
function renderBookmarks() {
  const el = document.getElementById('bookmarks-content');
  const bookmarked = state.articles.filter(a => state.bookmarkIds.has(a.id));

  if (!bookmarked.length) {
    el.innerHTML = `<div class="bookmarks-empty">ブックマークした記事はありません</div>`;
    return;
  }

  el.innerHTML = bookmarked.map(a => {
    const cat = state.categories.find(c => c.id === a.catId);
    return `<div class="article-card">
      <div class="article-badges">
        ${cat ? `<span class="badge ${cat.badge}">${cat.name}</span>` : ''}
        <span class="badge ${a.importance === '高' ? 'badge-imp-high' : a.importance === '中' ? 'badge-imp-mid' : 'badge-imp-low'}">重要度${a.importance}</span>
      </div>
      <div class="article-headline">${a.headline}</div>
      <div class="article-summary">${a.summary}</div>
      <div class="article-ai-comment">💬 ${a.comment}</div>
      <div class="article-actions">
        <button class="action-btn active" onclick="toggleBookmark('${a.id}');renderBookmarks()">★ 解除</button>
        <a class="action-link" href="${a.url}" target="_blank">元記事 →</a>
      </div>
    </div>`;
  }).join('');
}

// ── SETTINGS / CATEGORY EDITOR ──
function renderCategoryEditors() {
  const el = document.getElementById('category-editors');
  el.innerHTML = state.categories.map((cat, ci) => `
    <div class="category-editor">
      <div class="category-editor-header">
        <span class="category-editor-name">${cat.name}</span>
        <button class="btn-danger" onclick="removeCategory(${ci})">削除</button>
      </div>
      <div class="topic-list">
        ${cat.topics.map((t, ti) => `
          <div class="topic-item">
            <span class="topic-text">${t}</span>
            <button class="btn-remove" onclick="removeTopic(${ci},${ti})">×</button>
          </div>
        `).join('')}
      </div>
      <div class="add-topic-row">
        <input type="text" class="add-input" id="newtopic-${ci}" placeholder="トピックを追加">
        <button class="btn-add" onclick="addTopic(${ci})">追加</button>
      </div>
    </div>
  `).join('');
}

function addTopic(ci) {
  const input = document.getElementById('newtopic-' + ci);
  const val = input.value.trim();
  if (!val) return;
  state.categories[ci].topics.push(val);
  input.value = '';
  saveState();
  renderCategoryEditors();
  showToast('トピックを追加しました');
}

function removeTopic(ci, ti) {
  state.categories[ci].topics.splice(ti, 1);
  saveState();
  renderCategoryEditors();
}

function addCategory() {
  const input = document.getElementById('new-category-input');
  const name = input.value.trim();
  if (!name) return;
  const badges = ['badge-cat-ai','badge-cat-game','badge-cat-anime'];
  const id = 'cat_' + Date.now();
  state.categories.push({ id, name, badge: badges[state.categories.length % badges.length], topics: [] });
  input.value = '';
  saveState();
  renderCategoryEditors();
  showToast('カテゴリを追加しました');
}

function removeCategory(ci) {
  if (confirm(`「${state.categories[ci].name}」を削除しますか？`)) {
    state.categories.splice(ci, 1);
    saveState();
    renderCategoryEditors();
    showToast('カテゴリを削除しました');
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
function init() {
  loadState();

  // Set today's date
  const now = new Date();
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

  // Check if auto-fetch needed
  if (needsFetch() && state.settings.apiKey) {
    fetchNews();
  } else {
    renderToday();
  }

  renderCategoryEditors();

  // Expire check on load
  archiveOldNews();
  saveState();
}

init();
</script>
